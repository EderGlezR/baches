<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baches · Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Panel de administración</h1>
    <p><a href="index.html">&larr; Volver al sitio público</a></p>
  </header>

  <main>
    <form id="login-form">
      <label for="email">Correo</label>
      <input type="email" id="email" required />

      <label for="password">Contraseña</label>
      <input type="password" id="password" required />

      <button type="submit">Entrar</button>
      <p id="login-mensaje" role="status"></p>
    </form>

    <section id="admin-panel" hidden>
      <div class="admin-header">
        <p id="sesion-info"></p>
        <button type="button" id="logout-btn">Cerrar sesión</button>
      </div>
      <div id="admin-lista">Cargando reportes...</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
